<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Links Encurtados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="url"], input[type="text"] {
            width: 70%;
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .link-list { margin-top: 30px; }
        .link-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #007bff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .edit-btn { background-color: #ffc107; color: black; }
        .edit-btn:hover { background-color: #e0a905; }
    </style>
</head>
<body>

<div class="container">
    <h2>Criar Link Encurtado</h2>
    <div style="display: flex;">
        <input type="url" id="urlInput" placeholder="Cole sua URL longa aqui (ex: https://google.com)">
        <button onclick="criarLink()">Encurtar</button>
    </div>

    <div class="link-list">
        <h3>Seus Links Modificáveis</h3>
        <div id="listaLinks"></div>
    </div>
</div>

<script>
    // Configuração base: Usa o redirecionador público do TinyURL simulado por ID interno
    // Nota: Como o HTML puro não altera a internet real, este painel gerencia os destinos localmente.
    let links = JSON.parse(localStorage.getItem('meusLinks')) || [];

    function salvarNoStorage() {
        localStorage.setItem('meusLinks', JSON.stringify(links));
        renderizarLinks();
    }

    function gerarID() {
        return Math.random().toString(36).substring(2, 7);
    }

    function criarLink() {
        const urlOriginal = document.getElementById('urlInput').value;
        if (!urlOriginal) return alert('Insira uma URL válida!');

        const id = gerarID();
        // Em um sistema real, essa URL apontaria para o seu arquivo de redirecionamento (ex: seupainel.com/r?id=abc)
        const linkCurto = `${window.location.href.split('?')[0]}?r=${id}`;

        links.push({ id, linkCurto, urlOriginal });
        document.getElementById('urlInput').value = '';
        salvarNoStorage();
    }

    function editarLink(id) {
        const novoDestino = prompt("Digite o novo link de destino:");
        if (novoDestino) {
            const link = links.find(l => l.id === id);
            if (link) {
                link.urlOriginal = novoDestino;
                salvarNoStorage();
            }
        }
    }

    function deletarLink(id) {
        links = links.filter(l => l.id !== id);
        salvarNoStorage();
    }

    function renderizarLinks() {
        const lista = document.getElementById('listaLinks');
        lista.innerHTML = '';

        links.forEach(l => {
            lista.innerHTML += `
                <div class="link-item">
                    <div>
                        <strong>Curto:</strong> <a href="${l.urlOriginal}" target="_blank">${l.linkCurto}</a><br>
                        <small><strong>Destino atual:</strong> ${l.urlOriginal}</small>
                    </div>
                    <div>
                        <button class="edit-btn" onclick="editarLink('${l.id}')">Editar</button>
                        <button style="background-color: #dc3545;" onclick="deletarLink('${l.id}')">X</button>
                    </div>
                </div>
            `;
        });
    }

    // Lógica de Redirecionamento Automático caso alguém acesse o link encurtado
    const urlParams = new URLSearchParams(window.location.search);
    const idRedirecionamento = urlParams.get('r');
    if (idRedirecionamento) {
        const linkAlvo = links.find(l => l.id === idRedirecionamento);
        if (linkAlvo) {
            window.location.href = linkAlvo.urlOriginal;
        } else {
            document.body.innerHTML = "<h1>Link não encontrado ou expirado.</h1>";
        }
    } else {
        renderizarLinks();
    }
</script>

</body>
</html>
