<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Links Encurtados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #121214;
            color: #e1e1e6;
        }
        .container {
            background: #202024;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        h2, h3 {
            color: #ffffff;
        }
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            margin-right: 10px;
            border: 1px solid #323238;
            border-radius: 4px;
            background-color: #121214;
            color: #ffffff;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #00875f;
        }
        button {
            padding: 12px 20px;
            background-color: #00875f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { 
            background-color: #00b37e; 
        }
        .link-list { 
            margin-top: 30px; 
        }
        .link-item {
            background: #29292e;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            border-left: 4px solid #00875f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .link-item a {
            color: #61dafb;
            text-decoration: none;
        }
        .link-item a:hover {
            text-decoration: underline;
        }
        .link-item small {
            color: #8d8d99;
            display: block;
            margin-top: 4px;
            word-break: break-all;
        }
        .actions-btn {
            display: flex;
            gap: 8px;
        }
        .edit-btn { 
            background-color: #e1ba14; 
            color: #121214; 
        }
        .edit-btn:hover { 
            background-color: #ffdc3d; 
        }
        .delete-btn {
            background-color: #f75a68;
        }
        .delete-btn:hover {
            background-color: #ff7684;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Criar Link Encurtado</h2>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Ex: google.com ou https://google.com">
        <button onclick="criarLink()">Encurtar</button>
    </div>

    <div class="link-list">
        <h3>Seus Links Modificáveis</h3>
        <div id="listaLinks"></div>
    </div>
</div>

<script>
    let links = JSON.parse(localStorage.getItem('meusLinks')) || [];

    function urlValida(url) {
        url = url.trim();
        let dominio = url.replace(/^https?:\/\//i, '');
        const regexDominio = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/;
        return regexDominio.test(dominio);
    }

    function formatarURL(url) {
        url = url.trim();
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }
        return url;
    }

    function salvarNoStorage() {
        localStorage.setItem('meusLinks', JSON.stringify(links));
        renderizarLinks();
    }

    function gerarID() {
        return Math.random().toString(36).substring(2, 7);
    }

    function criarLink() {
        let urlOriginal = document.getElementById('urlInput').value;
        
        if (!urlOriginal || !urlValida(urlOriginal)) {
            return alert('Erro: Digite um domínio válido (ex: google.com). Apenas 1 palavra não é aceito.');
        }

        urlOriginal = formatarURL(urlOriginal);
        const id = gerarID();
        const linkCurto = `${window.location.origin}${window.location.pathname}?r=${id}`;

        links.push({ id, linkCurto, urlOriginal });
        document.getElementById('urlInput').value = '';
        salvarNoStorage();
    }

    function editarLink(id) {
        let novoDestino = prompt("Digite o novo link de destino:");
        if (novoDestino) {
            if (!urlValida(novoDestino)) {
                return alert('Erro: Digite um domínio válido (ex: google.com).');
            }
            novoDestino = formatarURL(novoDestino);
            const link = links.find(l => l.id === id);
            if (link) {
                link.urlOriginal = novoDestino;
                salvarNoStorage();
            }
        }
    }

    function deletarLink(id) {
        links = links.filter(l => l.id !== id);
        salvarNoStorage();
    }

    function renderizarLinks() {
        const lista = document.getElementById('listaLinks');
        lista.innerHTML = '';

        links.forEach(l => {
            lista.innerHTML += `
                <div class="link-item">
                    <div>
                        <strong>Curto:</strong> <a href="${l.linkCurto}">${l.linkCurto}</a><br>
                        <small><strong>Destino atual:</strong> ${l.urlOriginal}</small>
                    </div>
                    <div class="actions-btn">
                        <button class="edit-btn" onclick="editarLink('${l.id}')">Editar</button>
                        <button class="delete-btn" onclick="deletarLink('${l.id}')">X</button>
                    </div>
                </div>
            `;
        });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const idRedirecionamento = urlParams.get('r');
    if (idRedirecionamento) {
        const linkAlvo = links.find(l => l.id === idRedirecionamento);
        if (linkAlvo) {
            window.location.href = linkAlvo.urlOriginal;
        } else {
            document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;color:#f75a68;'>Link não encontrado ou expirado.</h1>";
        }
    } else {
        renderizarLinks();
    }
</script>

</body>
</html>
