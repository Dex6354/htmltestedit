<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Links Encurtados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .link-list { margin-top: 30px; }
        .link-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #007bff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .edit-btn { background-color: #ffc107; color: black; }
        .edit-btn:hover { background-color: #e0a905; }
    </style>
</head>
<body>

<div class="container">
    <h2>Criar Link Encurtado</h2>
    <div style="display: flex;">
        <input type="text" id="urlInput" placeholder="Ex: google.com ou https://google.com">
        <button onclick="criarLink()">Encurtar</button>
    </div>

    <div class="link-list">
        <h3>Seus Links Modificáveis</h3>
        <div id="listaLinks"></div>
    </div>
</div>

<script>
    let links = JSON.parse(localStorage.getItem('meusLinks')) || [];

    // Valida se a URL possui estrutura de domínio (ex: palavra.extensão)
    function urlValida(url) {
        url = url.trim();
        // Remove o protocolo temporariamente se existir para validar apenas o domínio
        let dominio = url.replace(/^https?:\/\//i, '');
        
        // Regex garante que tem pelo menos caracteres antes e depois de um ponto, sem espaços
        const regexDominio = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/;
        return regexDominio.test(dominio);
    }

    function formatarURL(url) {
        url = url.trim();
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }
        return url;
    }

    function salvarNoStorage() {
        localStorage.setItem('meusLinks', JSON.stringify(links));
        renderizarLinks();
    }

    function gerarID() {
        return Math.random().toString(36).substring(2, 7);
    }

    function criarLink() {
        let urlOriginal = document.getElementById('urlInput').value;
        
        if (!urlOriginal || !urlValida(urlOriginal)) {
            return alert('Erro: Digite um domínio válido (ex: google.com). Apenas 1 palavra não é aceito.');
        }

        urlOriginal = formatarURL(urlOriginal);
        const id = gerarID();
        const linkCurto = `${window.location.origin}${window.location.pathname}?r=${id}`;

        links.push({ id, linkCurto, urlOriginal });
        document.getElementById('urlInput').value = '';
        salvarNoStorage();
    }

    function editarLink(id) {
        let novoDestino = prompt("Digite o novo link de destino:");
        if (novoDestino) {
            if (!urlValida(novoDestino)) {
                return alert('Erro: Digite um domínio válido (ex: google.com).');
            }
            novoDestino = formatarURL(novoDestino);
            const link = links.find(l => l.id === id);
            if (link) {
                link.urlOriginal = novoDestino;
                salvarNoStorage();
            }
        }
    }

    function deletarLink(id) {
        links = links.filter(l => l.id !== id);
        salvarNoStorage();
    }

    function renderizarLinks() {
        const lista = document.getElementById('listaLinks');
        lista.innerHTML = '';

        links.forEach(l => {
            lista.innerHTML += `
                <div class="link-item">
                    <div>
                        <strong>Curto:</strong> <a href="${l.linkCurto}">${l.linkCurto}</a><br>
                        <small><strong>Destino atual:</strong> ${l.urlOriginal}</small>
                    </div>
                    <div>
                        <button class="edit-btn" onclick="editarLink('${l.id}')">Editar</button>
                        <button style="background-color: #dc3545;" onclick="deletarLink('${l.id}')">X</button>
                    </div>
                </div>
            `;
        });
    }

    // Executa o redirecionamento se houver parâmetro ?r= na URL
    const urlParams = new URLSearchParams(window.location.search);
    const idRedirecionamento = urlParams.get('r');
    if (idRedirecionamento) {
        const linkAlvo = links.find(l => l.id === idRedirecionamento);
        if (linkAlvo) {
            window.location.href = linkAlvo.urlOriginal;
        } else {
            document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Link não encontrado ou expirado.</h1>";
        }
    } else {
        renderizarLinks();
    }
</script>

</body>
</html>
